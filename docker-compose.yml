version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: quickkart_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickkart_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:


# docker stop quickkart_db
# docker-compose up -d
